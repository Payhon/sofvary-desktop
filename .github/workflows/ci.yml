name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PNPM_VERSION: 10.12.3

jobs:
  verify:
    name: TypeScript and Rust checks
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            wget

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint TypeScript workspaces
        run: pnpm lint

      - name: Typecheck TypeScript workspaces
        run: pnpm typecheck

      - name: Test TypeScript workspaces
        run: pnpm test

      - name: Check Rust formatting
        working-directory: apps/desktop/src-tauri
        run: cargo fmt --check

      - name: Test Rust desktop crate
        working-directory: apps/desktop/src-tauri
        run: cargo test -- --test-threads=1

      - name: Check Rust desktop crate
        working-directory: apps/desktop/src-tauri
        run: cargo check
