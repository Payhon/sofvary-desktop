name: Desktop Build and Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  PNPM_VERSION: 10.12.3

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build desktop on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows-x64
            experimental: false
          - os: macos-latest
            artifact: macos
            experimental: false
          - os: ubuntu-latest
            artifact: linux-x64
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            wget

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build unsigned desktop bundle
        env:
          CI: true
        run: pnpm build:desktop

      - name: Collect release assets
        shell: pwsh
        run: |
          $bundleRoot = "apps/desktop/src-tauri/target/release/bundle"
          $outputRoot = "release-assets"
          New-Item -ItemType Directory -Force -Path $outputRoot | Out-Null

          $files = Get-ChildItem -Path $bundleRoot -Recurse -File | Where-Object {
            $_.Name.EndsWith(".app.tar.gz") -or
            $_.Name.EndsWith(".AppImage") -or
            $_.Name.EndsWith(".zip") -or
            $_.Extension -in @(".deb", ".dmg", ".exe", ".msi", ".rpm")
          }

          if (-not $files) {
            throw "No Tauri bundle files were found under $bundleRoot."
          }

          foreach ($file in $files) {
            $safeName = $file.Name -replace "\s+", "-"
            $target = Join-Path $outputRoot "sofvary-desktop-${{ matrix.artifact }}-$safeName"
            Copy-Item -Path $file.FullName -Destination $target -Force
          }

          Get-ChildItem -Path $outputRoot -File | Format-Table Name, Length

      - name: Upload desktop bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sofvary-desktop-${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14
          path: release-assets/*

  publish:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.repository == 'Payhon/sofvary-desktop'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts
          pattern: sofvary-desktop-*

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find downloaded-artifacts -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" "release-assets/$(basename "$file")"
          done
          test -n "$(find release-assets -type f -print -quit)"
          (cd release-assets && shasum -a 256 * > SHA256SUMS.txt)
          ls -lah release-assets

      - name: Configure release target
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "title=Sofvary ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            {
              echo "notes<<EOF"
              echo "Automated Sofvary Desktop release for ${GITHUB_REF_NAME}."
              echo ""
              echo "Commit: ${GITHUB_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -f nightly "${GITHUB_SHA}"
            git push -f origin refs/tags/nightly

            echo "tag=nightly" >> "$GITHUB_OUTPUT"
            echo "title=Sofvary Nightly" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            {
              echo "notes<<EOF"
              echo "Automated preview build from main."
              echo ""
              echo "Commit: ${GITHUB_SHA}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          title="${{ steps.release.outputs.title }}"
          notes="${{ steps.release.outputs.notes }}"
          prerelease="${{ steps.release.outputs.prerelease }}"

          if [[ "$prerelease" == "true" ]]; then
            gh release delete "$tag" --yes || true
            gh release create "$tag" release-assets/* \
              --prerelease \
              --title "$title" \
              --notes "$notes"
          else
            if gh release view "$tag" >/dev/null 2>&1; then
              gh release edit "$tag" --title "$title" --notes "$notes"
              gh release upload "$tag" release-assets/* --clobber
            else
              gh release create "$tag" release-assets/* \
                --title "$title" \
                --notes "$notes"
            fi
          fi
